services:
  sign-classifier:
    build: .
    container_name: sign-classifier
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - "8501:8501"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: streamlit run src/app.py --server.address=0.0.0.0 --server.port=8501